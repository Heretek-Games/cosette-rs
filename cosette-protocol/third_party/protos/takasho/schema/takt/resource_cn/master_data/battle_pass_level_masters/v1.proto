syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.battle_pass_level_masters;

message BattlePassLevelMaster {
  string master_version = 1;
  int64 battle_pass_level_master_id = 2;
  int64 stage_id = 3;
  int64 exp_level = 4;
  string rewards = 5;
}

message BattlePassLevelMasters {
  message battle_pass_level_masters = 1;
}
