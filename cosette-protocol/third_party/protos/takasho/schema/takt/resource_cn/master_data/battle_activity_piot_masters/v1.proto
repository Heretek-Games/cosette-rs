syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.battle_activity_piot_masters;

message BattleActivityPiotMaster {
  string master_version = 1;
  int64 battle_activity_piot_master_id = 2;
  int64 battle_activity_master_id = 3;
  string plot_name = 4;
  int64 sort = 5;
  int64 pre_battle_id = 7;
  string require_condition = 8;
  string rewards = 90;
}

message BattleActivityPiotMasters {
  message battle_activity_piot_masters = 1;
}
