syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.keyword_masters;

message KeywordMaster {
  string master_version = 1;
  int64 keyword_master_id = 2;
  string keyword = 3;
  int64 level = 4;
  int64 battle_character_master_ids = 5;
}

message KeywordMasters {
  message keyword_masters = 1;
}
