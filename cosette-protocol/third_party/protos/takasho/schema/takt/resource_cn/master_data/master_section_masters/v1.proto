syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.master_section_masters;

message MasterSectionMaster {
  string master_version = 1;
  int64 master_section_master_id = 2;
  int64 next_id = 3;
  int64 judgement_master_ids = 4;
  int64 effect_master_ids = 5;
  int64 side_effect_master_ids = 6;
  int64 judgment_mission_id = 7;
}

message MasterSectionMasters {
  message master_section_masters = 1;
}
