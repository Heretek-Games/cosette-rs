syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.underground_chapter_masters;

message UndergroundChapterMaster {
  string master_version = 1;
  int64 underground_chapter_master_id = 2;
  int64 underground_level_master_id = 3;
  string name = 11;
  string unlock_condition = 12;
  string start_cost_contents = 13;
}

message UndergroundChapterMasters {
  message underground_chapter_masters = 1;
}
