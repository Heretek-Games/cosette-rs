  int64 int_fix_value = 10;
  enumeration = "PatchFixType" res_fix_type = 11;
  int64 res_fix_value = 12;
  enumeration = "PatchFixType" dex_fix_type = 13;
  int64 dex_fix_value = 14;
  enumeration = "PatchFixType" crt_fix_type = 15;
  int64 crt_fix_value = 16;
  enumeration = "PatchFixType" crd_fix_type = 17;
  int64 crd_fix_value = 18;
  enumeration = "PatchFixType" acrt_fix_type = 19;
  int64 acrt_fix_value = 20;
  enumeration = "PatchFixType" crdr_fix_type = 21;
  int64 crdr_fix_value = 22;
