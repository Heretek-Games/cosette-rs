syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.phoneme_suit_masters;

message PhonemeSuitMaster {
  string master_version = 1;
  int64 phoneme_suit_master_id = 2;
  string name = 3;
  string slot_color = 4;
  string require_condition = 6;
  int64 buff_skill = 7;
  int64 skill_up = 8;
}

message PhonemeSuitMasters {
  message phoneme_suit_masters = 1;
}
