syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.crusade_map_masters;

message CrusadeMapMaster {
  string master_version = 1;
  int64 crusade_map_master_id = 2;
  int64 crusade_map_show_master_id = 3;
  int64 next = 4;
  int64 crusade_event_group_master_ids = 5;
  int64 node_type = 6;
  string unlock_condition = 7;
}

message CrusadeMapMasters {
  message crusade_map_masters = 1;
}
