syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.disguise_masters;

message DisguiseMaster {
  string master_version = 1;
  int64 disguise_master_id = 2;
  string name = 3;
  string target = 5;
  enumeration = "DisguiseType" disguise_type = 6;
  string condition = 7;
  string cost = 8;
}

message DisguiseMasters {
  message disguise_masters = 1;
}
