syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.phoneme_level_up_masters;

message PhonemeLevelUpMaster {
  string master_version = 1;
  int64 phoneme_level_up_master_id = 2;
  int64 level = 3;
  int64 exp_n = 4;
  int64 exp_r = 5;
  int64 exp_sr = 6;
  int64 exp_ssr = 7;
}

message PhonemeLevelUpMasters {
  message phoneme_level_up_masters = 1;
}
