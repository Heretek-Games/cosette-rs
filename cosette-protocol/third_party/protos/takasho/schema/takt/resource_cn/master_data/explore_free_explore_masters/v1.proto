syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.explore_free_explore_masters;

import "takasho/schema/super/super/super/super/score/resource_cn/common/v1/TriggerType.proto";

import "takasho/schema/super/explore_event_masters/v1/ExploreEventType.proto";

import "takasho/schema/super/super/super/super/score/resource_cn/common/v1/LimitType.proto";

message ExploreFreeExploreMaster {
  string master_version = 1;
  int64 explore_free_explore_master_id = 2;
  string name = 3;
  int64 energy_cost = 4;
  int64 lifetime_hours = 5;
  string trigger_param_1 = 12;
  string trigger_param_2 = 13;
  string trigger_param_3 = 14;
  string condition = 21;
  string event_param_1 = 32;
  string event_param_2 = 33;
  int64 limit_count = 42;
  int64 limit_cooldown_hours = 43;
  string rewards = 51;
  int64 explore_object_master_id = 52;
  int64 explore_point_master_id = 53;
  string first_time_rewards = 54;
  int64 drop_master_id = 55;
}

message ExploreFreeExploreMasters {
  message explore_free_explore_masters = 1;
}
