syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.battle_character_masters;

message BattleCharacterMaster {
  string master_version = 99;
  int64 battle_character_master_id = 1;
  int64 character_master_id = 2;
  int64 character_type_id = 3;
  int64 sort_id = 4;
  string name = 5;
  enumeration = "Rarity" rarity = 11;
  int64 initial_rank = 12;
