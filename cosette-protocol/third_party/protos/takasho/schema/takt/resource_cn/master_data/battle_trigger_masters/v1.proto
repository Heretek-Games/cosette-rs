syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.battle_trigger_masters;

message BattleTriggerMaster {
  string master_version = 1;
  int64 battle_trigger_master_id = 2;
  string trigger_type = 3;
  int64 effect_values = 4;
}

message BattleTriggerMasters {
  message battle_trigger_masters = 1;
}
