syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.private_talk_masters;

message PrivateTalkMaster {
  string master_version = 1;
  int64 private_talk_master_id = 2;
  int64 keyword_id = 3;
  int64 character_master_id = 4;
  int64 battle_character_master_id = 5;
  bool can_rand_drop = 6;
  int64 bond_level = 7;
}

message PrivateTalkMasters {
  message private_talk_masters = 1;
}
