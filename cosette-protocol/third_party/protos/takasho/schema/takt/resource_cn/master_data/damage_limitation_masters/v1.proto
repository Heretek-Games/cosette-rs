syntax = "proto3";

package takasho.schema.takt.resource_cn.master_data.damage_limitation_masters;

message DamageLimitationMaster {
  string master_version = 99;
  int64 damage_limitation_master_id = 1;
  int64 character_id = 2;
  int64 level = 3;
  int64 damage_limit = 4;
}

message DamageLimitationMasters {
  message damage_limitation_masters = 1;
}
