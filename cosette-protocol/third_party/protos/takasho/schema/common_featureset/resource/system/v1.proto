syntax = "proto3";

package takasho.schema.common_featureset.resource.system;

message DeviceInfo {
  enumeration = "PlatformType" platform = 1;
}

message PlayerStatus {
  sint64 status = 1;
  string description = 2;
  sint64 expired_at = 3;
  bool has_expired_at = 4;
}

message BanStatus {
  sint64 status = 1;
  string description = 2;
  sint64 expired_at = 3;
  bool has_expired_at = 4;
}
