syntax = "proto3";

package takasho.schema.common_featureset.resource.master_data;

message LoginBonuses {
  message login_bonuses = 1;
}

import "takasho/schema/super/login_bonus/v1/ResetType.proto";

message LoginBonus {
  string login_bonus_id = 1;
  sint64 opened_at = 2;
  sint64 closed_at = 3;
  enumeration = "super::super::login_bonus::v1::ResetType" reset_type = 4;
  string date_line = 5;
  sint64 time_lapse = 6;
  message prizes = 7;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message LoginBonusPrize {
  string login_bonus_prize_id = 1;
  sint64 prize_count = 2;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 3;
  string schema_key = 4;
  string value_path = 5;
  string inventory_message = 6;
  string search_label = 7;
  string system_resource_name = 8;
  sint64 system_resource_num = 9;
  string transaction_payload = 10;
}
