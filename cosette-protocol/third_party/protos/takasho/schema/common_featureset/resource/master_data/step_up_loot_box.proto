syntax = "proto3";

package takasho.schema.common_featureset.resource.master_data;

message StepUpLootBoxes {
  message step_up_loot_box_products = 1;
}

message StepUpLootBoxProduct {
  string step_up_loot_box_product_id = 1;
  sint64 opened_at = 2;
  sint64 closed_at = 3;
  bool is_loop = 4;
  message steps = 5;
}

import "takasho/schema/consume_resource_set/ConsumeResourceSet.proto";

message Step {
  sint64 step_up_loot_box_step_num = 1;
  string inventory_message = 4;
  message content_sets = 5;
  bool has_extra = 6;
  message extras = 7;
  sint64 repeat_num = 8;
  message consume_resource_sets = 9;
  string transaction_payload = 10;
}

message StepUpLootBoxContentSet {
  string step_up_loot_box_content_set_id = 1;
  sint64 lot_num = 2;
  message contents = 3;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message StepUpLootBoxContent {
  string step_up_loot_box_content_id = 1;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 2;
  string schema_key = 3;
  string value_path = 4;
  sint64 weight = 5;
  string label = 6;
  string search_label = 7;
}

message Extra {
  string step_up_loot_box_extra_id = 1;
  string inventory_message = 2;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 3;
  string schema_key = 4;
  bytes = "vec" value = 5;
  string value_path = 6;
  string system_resource_name = 7;
  sint64 system_resource_num = 8;
  string search_label = 9;
  string transaction_payload = 10;
}
