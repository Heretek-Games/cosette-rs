syntax = "proto3";

package takasho.schema.common_featureset.resource.baas_product;

message BaasProduct {
  string baas_product_id = 1;
  string inventory_message = 2;
  message extras = 3;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message BaasProductExtra {
  string baas_product_extra_id = 1;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 2;
  string schema_key = 3;
  bytes = "vec" value = 4;
  string system_resource_name = 5;
  sint64 system_resource_num = 6;
  string search_label = 7;
}
