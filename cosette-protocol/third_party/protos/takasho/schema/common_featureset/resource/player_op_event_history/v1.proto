syntax = "proto3";

package takasho.schema.common_featureset.resource.player_op_event_history;

import "takasho/schema/super/op_event/v1/OpEventType.proto";

message PlayerOpEventHistory {
  string player_op_event_history_id = 1;
  string transaction_id = 2;
  string op_event_id = 3;
  enumeration = "super::super::op_event::v1::OpEventType" op_event_type = 4;
  string player_id = 5;
}
