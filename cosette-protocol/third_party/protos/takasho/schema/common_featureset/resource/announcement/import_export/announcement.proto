syntax = "proto3";

package takasho.schema.common_featureset.resource.announcement.import_export;

message Announcements {
  message announcements = 1;
}

message Announcement {
  string id = 1;
  string language_code = 2;
  string title = 3;
  sint64 display_priority = 4;
  sint64 opened_at = 5;
  sint64 closed_at = 6;
  string value_path = 7;
  message contents = 8;
  enumeration = "announcement::PlatformType" platform_type = 9;
}

message AnnouncementContent {
  string schema_key = 1;
  string value_path = 2;
}
