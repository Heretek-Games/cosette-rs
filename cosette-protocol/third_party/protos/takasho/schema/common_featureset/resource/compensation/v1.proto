syntax = "proto3";

package takasho.schema.common_featureset.resource.compensation;

message Compensations {
  message compensations = 1;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message Compensation {
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 1;
  string schema_key = 2;
  string value_path = 3;
  string message = 4;
  sint64 receivable_sec = 5;
  string search_label = 6;
  string system_resource_name = 7;
  sint64 system_resource_num = 8;
  string transaction_payload = 9;
}
