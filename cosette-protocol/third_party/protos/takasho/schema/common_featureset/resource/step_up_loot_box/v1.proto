syntax = "proto3";

package takasho.schema.common_featureset.resource.step_up_loot_box;

message StepUpLootBoxProduct {
  string step_up_loot_box_product_id = 1;
  sint64 opened_at = 2;
  sint64 closed_at = 3;
  bool is_loop = 4;
  message step_up_loot_box_steps = 5;
}

message StepUpLootBoxProductWithPlayerStepNum {
  message product = 1;
  sint64 player_step_num = 2;
}

import "takasho/schema/super/consume_resource_set/v1/ConsumeResourceSet.proto";

message StepUpLootBoxStep {
  string step_up_loot_box_product_id = 1;
  sint64 step_up_loot_box_step_num = 2;
  string inventory_message = 5;
  bool has_extra = 6;
  message extras = 7;
  sint64 repeat_num = 8;
  sint64 total_lot_num = 9;
  message step_up_loot_box_content_sets = 10;
  message consume_resource_sets = 11;
}

message StepUpLootBoxContentSet {
  string step_up_loot_box_product_id = 1;
  sint64 step_up_loot_box_step_num = 2;
  string step_up_loot_box_content_set_id = 3;
  sint64 lot_num = 4;
  message contents = 5;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message StepUpLootBoxContent {
  string step_up_loot_box_product_id = 1;
  sint64 step_up_loot_box_step_num = 2;
  string step_up_loot_box_content_set_id = 3;
  string step_up_loot_box_content_id = 4;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 5;
  string schema_key = 6;
  bytes = "vec" value = 7;
  sint64 weight = 8;
  string label = 9;
  string search_label = 10;
}

message StepUpLootBoxProbability {
  string step_up_loot_box_product_id = 1;
  message step_up_loot_box_step_probabilities = 2;
}

message StepUpLootBoxStepProbability {
  sint64 step_up_loot_box_step_num = 1;
  message step_up_loot_box_content_set_probabilities = 2;
}

message StepUpLootBoxContentSetProbability {
  string step_up_loot_box_content_set_id = 1;
  message step_up_loot_box_content_probabilities = 2;
  message step_up_loot_box_label_probability = 3;
}

message StepUpLootBoxContentProbability {
  string step_up_loot_box_content_id = 1;
  bytes = "vec" value = 2;
  string probability = 3;
}

message StepUpLootBoxLabelProbability {
  string label = 1;
  string probability = 2;
}

message Extra {
  string step_up_loot_box_extra_id = 1;
  string inventory_message = 2;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 3;
  string schema_key = 4;
  bytes = "vec" value = 5;
  string resource_name = 6;
  sint64 resource_num = 7;
  string search_label = 8;
}
