syntax = "proto3";

package takasho.schema.common_featureset.resource.step_up_loot_box;

message StepUpLootBoxProduct {
  string step_up_loot_box_product_id = 1;
  sint64 opened_at = 2;
  sint64 closed_at = 3;
  bool is_loop = 4;
  sint64 loop_times = 5;
  message step_up_loot_box_steps = 6;
  sint64 next_step_num = 7;
  sint64 next_step_repeat_times = 8;
}

import "takasho/schema/super/consume_resource_set/v1/ConsumeResourceSet.proto";

message StepUpLootBoxStep {
  sint64 step_up_loot_box_step_num = 1;
  string inventory_message = 2;
  bool has_extra = 3;
  message extras = 4;
  sint64 repeat_times = 5;
  message step_up_loot_box_content_sets = 6;
  message consume_resource_sets = 7;
}

message StepUpLootBoxContentSet {
  string step_up_loot_box_content_set_id = 1;
  sint64 lot_num = 2;
  message labels = 3;
}

message StepUpLootBoxLabel {
  string step_up_loot_box_label = 1;
  sint64 weight = 2;
  message contents = 3;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message StepUpLootBoxContent {
  string step_up_loot_box_content_id = 1;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 2;
  string schema_key = 3;
  bytes = "vec" value = 4;
  sint64 weight = 5;
  string resource_name = 6;
  sint64 resource_num = 7;
  string search_label = 8;
}

message Extra {
  string step_up_loot_box_extra_id = 1;
  string inventory_message = 2;
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 3;
  string schema_key = 4;
  bytes = "vec" value = 5;
  string resource_name = 6;
  sint64 resource_num = 7;
  string search_label = 8;
}

message StepUpLootBoxProbability {
  string step_up_loot_box_product_id = 1;
  message step_up_loot_box_step_probabilities = 2;
}

message StepUpLootBoxStepProbability {
  sint64 step_num = 1;
  message step_up_loot_box_content_set_probabilities = 2;
}

message StepUpLootBoxContentSetProbability {
  string step_up_loot_box_content_set_id = 1;
  sint64 lot_num = 2;
  message step_up_loot_box_label_probabilities = 3;
  message step_up_loot_box_content_probabilities_in_content_set = 4;
}

message StepUpLootBoxLabelProbability {
  string label = 1;
  string probability = 2;
  message step_up_loot_box_content_probabilities_in_label = 3;
}

message StepUpLootBoxContentProbabilityInLabel {
  string step_up_loot_box_content_id = 1;
  string schema_key = 2;
  bytes = "vec" value = 3;
  string probability = 4;
}

message StepUpLootBoxContentProbabilityInContentSet {
  string step_up_loot_box_content_id = 1;
  string schema_key = 2;
  bytes = "vec" value = 3;
  string probability = 4;
}
