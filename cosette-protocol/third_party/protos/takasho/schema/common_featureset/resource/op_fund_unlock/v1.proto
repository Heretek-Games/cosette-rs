syntax = "proto3";

package takasho.schema.common_featureset.resource.op_fund_unlock;

message OpFundUnlock {
  string op_event_id = 1;
  string op_fund_unlock_id = 2;
  string objective_ids = 3;
  message prizes = 4;
}

import "takasho/schema/super/player_inventory/v1/ItemType.proto";

message OpFundUnlockPrize {
  enumeration = "super::super::player_inventory::v1::ItemType" item_type = 4;
  string schema_key = 5;
  bytes = "vec" value = 6;
  string search_label = 7;
  string system_resource_name = 8;
  sint64 system_resource_num = 9;
}
