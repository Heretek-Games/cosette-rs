syntax = "proto3";

package takasho.schema.common_featureset.resource.realm;

message Realm {
  int64 initial_realm_id = 1;
  int64 current_realm_id = 2;
  string name = 3;
  enumeration = "Status" status = 4;
  int64 open_at = 5;
  string game_server = 6;
  string http_server = 7;
  string extra_info2 = 8;
  string extra_info3 = 9;
}
