syntax = "proto3";

package takasho.schema.score.resource_cn.battle_pass;

message PlayerBattlePass {
  string player_id = 1;
  int64 battle_pass_season_id = 2;
  int64 stage_level = 3;
  int64 exp_unlimit = 4;
  int64 exp_limit = 5;
  int64 exp_weekly = 6;
  int64 purchase_level_times = 7;
  sint64 last_refresh_time = 8;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}
