syntax = "proto3";

package takasho.schema.score.resource_cn.credit;

message PlayerCredit {
  string player_id = 1;
  string purchase_id = 2;
  int64 credit_point = 3;
  int64 last_update_at = 4;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message PlayerCreditPointResponse {
  int64 credit_points = 1;
  int64 base_time = 2;
  int64 countdown_time = 3;
  int64 reach_level_master_id = 4;
}
