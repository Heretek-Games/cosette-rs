syntax = "proto3";

package takasho.schema.score.resource_cn.analytics_event_log;

message RoleInfo {
  string role_key = 1;
  string role_id = 2;
  string zone_id = 3;
  string level = 4;
  string vip = 5;
  string player_id = 6;
  string role_name = 7;
}

message ARst {
  string obj = 1;
  int64 before = 2;
  int64 after = 3;
  int64 diff = 4;
}

message BaseInfo {
  sint64 last_login_day = 1;
  sint64 create_day = 2;
}

message CoinInfo {
  int64 diamond = 1;
  int64 free_diamond = 2;
  int64 stone = 3;
  int64 free_stone = 4;
  int64 gold = 5;
  int64 strength = 6;
  int64 exp = 7;
}

message StageInfo {
  int64 normal_stage = 1;
  int64 hard_stage = 2;
  int64 guide = 3;
  message dq_stage_info = 4;
}

message DqStageInfo {
  int64 dq_chapter_id = 1;
  int64 dq_id = 2;
}

message CardInfo {
  int64 level = 1;
  int64 star = 2;
  int64 grade = 3;
  int64 skill = 4;
  string arrange = 5;
  int64 sub_star = 6;
}

message EquipInfo {
  int64 level = 1;
  int64 star = 2;
  int64 grade = 3;
  int64 card_id = 4;
  int64 keyword = 5;
}

message PlayerEquipInfo {
  int64 equip_id = 1;
  string unique_id = 2;
  string equip_name = 3;
  message equip_info = 4;
}

message PhonemeInfo {
  int64 level = 1;
  int64 slot = 2;
  int64 card_id = 3;
  message buff_values = 4;
}

message PlayerPhonemeInfo {
  int64 phoneme_id = 1;
  string unique_id = 2;
  message phoneme_info = 3;
}

message FightInfo {
  int64 round = 1;
  int64 dead_card = 2;
  message damage = 3;
  message skill_use = 4;
  bool condition = 5;
  string auto = 6;
  int64 monster = 7;
}

message FightResultInfo {
  string successful = 1;
  int64 achievements = 2;
  int64 stars = 3;
}

message ItemInfo {
  int64 item_id = 1;
  int64 item_count = 2;
}

message Team {
  int64 battle_character_ids = 1;
}

message PlotInfo {
}

message ExploreInfo {
}

message ExtraInfo {
}

message GoodsInfo {
  int64 item_id = 1;
  string item_name = 2;
  int64 position = 3;
  string discount = 4;
  int64 category = 5;
  int64 num = 6;
}

message BadgeInfo {
  int64 badge_id = 1;
  string name = 2;
}

