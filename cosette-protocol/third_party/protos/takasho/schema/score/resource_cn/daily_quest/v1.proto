syntax = "proto3";

package takasho.schema.score.resource_cn.daily_quest;

message PlayerDailyQuestSweep {
  string player_id = 1;
  int64 daily_quest_master_id = 2;
  enumeration = "DailyQuestSweepStatus" status = 3;
  sint64 start_at = 4;
  sint64 end_at = 5;
  int64 times = 6;
  int64 seed = 7;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message PlayerDailyQuest {
  string player_id = 1;
  int64 daily_quest_master_id = 2;
  int64 normal_count = 4;
  int64 last_normal_timestamp = 5;
  int64 skip_count = 6;
  int64 last_skip_timestamp = 7;
  bool already_three_star = 8;
  int64 least_battle_time = 9;
  int64 stars = 10;
  message afk_characters = 100;
  string db_afk_characters = 101;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message LeastBattleTimeCharacter {
  int64 battle_character_id = 1;
  int64 rank = 2;
  int64 level = 3;
}
