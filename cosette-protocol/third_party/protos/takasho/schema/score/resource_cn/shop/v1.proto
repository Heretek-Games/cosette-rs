syntax = "proto3";

package takasho.schema.score.resource_cn.shop;

message PlayerPurchaseRecord {
  string player_id = 1;
  int64 product_id = 3;
  int64 total_purchase_count = 4;
  int64 current_purchase_count = 5;
  sint64 refreshed_at = 6;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message ShopActiveTime {
  int64 shop_master_id = 1;
  sint64 start_at = 2;
  sint64 end_at = 3;
  sint64 pre_start_at = 4;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message ProductActiveTime {
  int64 product_master_id = 1;
  sint64 start_at = 2;
  sint64 end_at = 3;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}
