syntax = "proto3";

package takasho.schema.score.resource_cn.equipment;

message PlayerEquipment {
  string player_id = 1;
  string player_equipment_id = 2;
  int64 equipment_master_id = 3;
  int64 battle_character_master_id = 4;
  int64 exp = 5;
  bool is_lock = 6;
  int64 grade = 7;
  int64 rank = 8;
  bool get_for_first_time = 9;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}
