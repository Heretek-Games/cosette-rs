syntax = "proto3";

package takasho.schema.score.resource_cn.gmtool_log;

message GmtoolLogs {
  string gmtool_log_id = 1;
  string req_url = 2;
  string req_body = 3;
  string operator_email = 4;
  sint64 req_time = 5;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message OperatorImpl {
  string email = 1;
  string roles = 2;
}
