syntax = "proto3";

package takasho.schema.score.resource_cn.check_in;

message PlayerActivityCheckIn {
  string player_id = 1;
  int64 activity_check_in_master_id = 2;
  int64 activity_check_in_entry_ids = 3;
  int64 activity_check_in_entry_reward_ids = 4;
  sint64 last_check_in_at = 81;
  sint64 limited_at = 82;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}
