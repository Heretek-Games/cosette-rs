syntax = "proto3";

package takasho.schema.score.resource_cn.chapter;

message PlayerChapter {
  string player_id = 1;
  int64 chapter = 2;
  int64 section = 3;
  enumeration = "Status" status = 4;
  int64 battles = 5;
  string flags = 6;
  int64 battling = 7;
  int64 last_update_time = 8;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}

message PlayerChapterUnlockRecord {
  string player_id = 1;
  int64 chapter = 2;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}
