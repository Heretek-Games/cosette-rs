syntax = "proto3";

package takasho.schema.score.resource_cn.battle_zone;

message PlayerBattleZoneBattle {
  string player_id = 1;
  int64 battle_zone_battle_master_id = 2;
  int64 star_num = 3;
  sint64 created_at = 91;
  sint64 updated_at = 92;
  bool star_first_satisfied = 101;
  bool star_second_satisfied = 102;
  bool star_third_satisfied = 103;
}

message PlayerBattleZone {
  string player_id = 1;
  int64 battle_zone_master_id = 2;
  enumeration = "PlayerBattleZoneStatus" status = 3;
  int64 stage_one_update_time = 4;
  int64 stage_two_update_time = 5;
  int64 stage_three_update_time = 6;
  int64 battle_zone_chests = 7;
  int64 star_count = 8;
  sint64 created_at = 91;
  sint64 updated_at = 92;
  message battles = 100;
}
