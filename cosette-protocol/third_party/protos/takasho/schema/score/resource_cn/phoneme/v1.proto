syntax = "proto3";

package takasho.schema.score.resource_cn.phoneme;

message PhonemeBuffEntry {
  int64 phoneme_buff_master_ids = 1;
}

message PlayerPhoneme {
  string player_id = 1;
  string player_phoneme_id = 2;
  int64 phoneme_master_id = 3;
  int64 exp = 4;
  int64 grade = 5;
  string buff_ids_values = 31;
  string buff_ids_values_candidates = 39;
  message res_buff_ids_values = 45;
  message res_buff_ids_values_candidates = 46;
  int64 battle_character_master_id = 8;
  int64 equipped_slot_position_index = 9;
  int64 construct_buff_master_id = 10;
  int64 pending_construct_buff_master_id = 11;
  int64 is_lock = 12;
  sint64 created_at = 91;
  sint64 updated_at = 92;
}
